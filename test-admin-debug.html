<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Debug Test - MedAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">Admin Panel Debug Test</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Supabase Connection Test -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">🔌 Supabase Connection</h2>
                <div id="supabaseStatus" class="text-gray-500">Testing...</div>
                <button onclick="testSupabase()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                    Test Connection
                </button>
            </div>
            
            <!-- Authentication Test -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">🔐 Authentication</h2>
                <div id="authStatus" class="text-gray-500">Not tested</div>
                <button onclick="testAuth()" class="mt-4 px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
                    Test Auth
                </button>
            </div>
            
            <!-- Database Query Test -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">🗄️ Database Access</h2>
                <div id="dbStatus" class="text-gray-500">Not tested</div>
                <button onclick="testDatabase()" class="mt-4 px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700">
                    Test Database
                </button>
            </div>
            
            <!-- Console Log -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">📝 Console Log</h2>
                <div id="consoleLog" class="text-sm text-gray-600 font-mono bg-gray-100 p-4 rounded max-h-40 overflow-y-auto">
                    Logs will appear here...
                </div>
                <button onclick="clearLog()" class="mt-4 px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                    Clear Log
                </button>
            </div>
        </div>
        
        <!-- Direct Admin Panel Test -->
        <div class="mt-8 bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-semibold mb-4">🚀 Admin Panel Access</h2>
            <p class="text-gray-600 mb-4">If all tests pass, try opening the admin panel:</p>
            <a href="admin-v2.html" class="inline-block px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                Open Admin Panel
            </a>
        </div>
    </div>
    
    <!-- Include Supabase Config -->
    <script src="supabase-config.js"></script>
    
    <script>
        // Override console.log to show in UI
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        function addToLog(message, type = 'info') {
            const logDiv = document.getElementById('consoleLog');
            const timestamp = new Date().toLocaleTimeString();
            const colorClass = type === 'error' ? 'text-red-600' : 
                              type === 'warn' ? 'text-yellow-600' : 'text-blue-600';
            logDiv.innerHTML += `<div class="${colorClass}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            
            // Also log to actual console
            if (type === 'error') originalError(message);
            else if (type === 'warn') originalWarn(message);
            else originalLog(message);
        }
        
        console.log = (msg) => addToLog(msg, 'info');
        console.error = (msg) => addToLog(msg, 'error');
        console.warn = (msg) => addToLog(msg, 'warn');
        
        function clearLog() {
            document.getElementById('consoleLog').innerHTML = 'Logs cleared...';
        }
        
        async function testSupabase() {
            const statusDiv = document.getElementById('supabaseStatus');
            statusDiv.innerHTML = '<span class="text-yellow-600">Testing...</span>';
            
            try {
                console.log('Testing Supabase connection...');
                
                // Check if MedAISupabase is available
                if (!window.MedAISupabase) {
                    throw new Error('MedAISupabase not found on window object');
                }
                
                const supabase = window.MedAISupabase.getSupabase();
                if (!supabase) {
                    throw new Error('Supabase client not initialized');
                }
                
                console.log('✅ Supabase client available');
                statusDiv.innerHTML = '<span class="text-green-600">✅ Connected</span>';
                
            } catch (error) {
                console.error('❌ Supabase connection failed:', error.message);
                statusDiv.innerHTML = `<span class="text-red-600">❌ Failed: ${error.message}</span>`;
            }
        }
        
        async function testAuth() {
            const statusDiv = document.getElementById('authStatus');
            statusDiv.innerHTML = '<span class="text-yellow-600">Testing...</span>';
            
            try {
                if (!window.MedAISupabase) {
                    throw new Error('Supabase not available');
                }
                
                const supabase = window.MedAISupabase.getSupabase();
                console.log('Testing authentication...');
                
                const { data: { user }, error } = await supabase.auth.getUser();
                
                if (error) {
                    console.warn('⚠️ Auth error:', error.message);
                    statusDiv.innerHTML = `<span class="text-yellow-600">⚠️ No user logged in</span>`;
                } else if (user) {
                    console.log('✅ User authenticated:', user.email);
                    statusDiv.innerHTML = `<span class="text-green-600">✅ Logged in as: ${user.email}</span>`;
                } else {
                    console.log('ℹ️ No user session');
                    statusDiv.innerHTML = '<span class="text-gray-600">ℹ️ No active session</span>';
                }
                
            } catch (error) {
                console.error('❌ Auth test failed:', error.message);
                statusDiv.innerHTML = `<span class="text-red-600">❌ Failed: ${error.message}</span>`;
            }
        }
        
        async function testDatabase() {
            const statusDiv = document.getElementById('dbStatus');
            statusDiv.innerHTML = '<span class="text-yellow-600">Testing...</span>';
            
            try {
                if (!window.MedAISupabase) {
                    throw new Error('Supabase not available');
                }
                
                const supabase = window.MedAISupabase.getSupabase();
                console.log('Testing database access...');
                
                // Test profiles table access
                const { data, error } = await supabase
                    .from('profiles')
                    .select('count')
                    .limit(1);
                
                if (error) {
                    console.error('❌ Database error:', error.message);
                    statusDiv.innerHTML = `<span class="text-red-600">❌ DB Error: ${error.message}</span>`;
                } else {
                    console.log('✅ Database accessible');
                    statusDiv.innerHTML = '<span class="text-green-600">✅ Database accessible</span>';
                }
                
            } catch (error) {
                console.error('❌ Database test failed:', error.message);
                statusDiv.innerHTML = `<span class="text-red-600">❌ Failed: ${error.message}</span>`;
            }
        }
        
        // Auto-run tests on page load
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🔧 Starting debug tests...');
            
            setTimeout(testSupabase, 500);
            setTimeout(testAuth, 1000);
            setTimeout(testDatabase, 1500);
        });
    </script>
</body>
</html>
