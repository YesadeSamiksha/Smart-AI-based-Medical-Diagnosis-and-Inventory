<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Redirect file:// to localhost:8080 (required for ES modules & CORS) -->
    <script>
        if (window.location.protocol === 'file:') {
            var fileName = window.location.pathname.split('/').pop() || 'index.html';
            window.location.replace('http://localhost:8080/' + fileName);
        }
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="shapegrid.css">
    
    <style>
        body { background: rgba(10, 10, 10, 0.85); color: white; min-height: 100vh; }
        
        .checkout-container {
            max-width: 1000px;
            margin: 100px auto 50px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        
        .checkout-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-title i {
            color: #cccccc;
        }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            margin-bottom: 12px;
        }
        
        .payment-option {
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .payment-option:hover {
            border-color: #cccccc;
            background: rgba(200, 200, 200, 0.1);
        }
        
        .payment-option.selected {
            border-color: #cccccc;
            background: rgba(200, 200, 200, 0.2);
        }
        
        .payment-icon {
            width: 50px;
            height: 50px;
            background: rgba(200, 200, 200, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .btn-place-order {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-place-order:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
        }
        
        .btn-place-order:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .summary-row.total {
            font-size: 20px;
            font-weight: 700;
            border-bottom: none;
            padding-top: 16px;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(74, 222, 128, 0.15);
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #cccccc;
            outline: none;
        }
    </style>
</head>
<body>
    
    
    <div class="checkout-container">
        <div class="mb-4">
            <a href="shop.html" class="text-gray-400 hover:text-white">
                <i class="fas fa-arrow-left mr-2"></i>Back to Shop
            </a>
        </div>
        
        <h1 class="text-4xl font-bold mb-6">
            <i class="fas fa-shopping-cart mr-3 text-gray-400"></i>Checkout
        </h1>
        
        <div class="row">
            <div class="col-md-7">
                <!-- Delivery Address -->
                <div class="checkout-section">
                    <div class="section-title">
                        <i class="fas fa-map-marker-alt"></i>
                        Delivery Address
                    </div>
                    <input type="text" id="fullName" class="form-control" placeholder="Full Name" required>
                    <input type="text" id="phone" class="form-control" placeholder="Phone Number" required>
                    <textarea id="address" class="form-control" rows="3" placeholder="Complete Address" required></textarea>
                    <div class="row">
                        <div class="col-md-6">
                            <input type="text" id="city" class="form-control" placeholder="City" required>
                        </div>
                        <div class="col-md-6">
                            <input type="text" id="pincode" class="form-control" placeholder="PIN Code" required>
                        </div>
                    </div>
                </div>
                
                <!-- Payment Method -->
                <div class="checkout-section">
                    <div class="section-title">
                        <i class="fas fa-credit-card"></i>
                        Payment Method
                    </div>
                    
                    <div class="payment-option selected" data-method="online" onclick="selectPayment('online')">
                        <div class="payment-icon">
                            <i class="fas fa-wallet"></i>
                        </div>
                        <div>
                            <div class="font-bold">Online Payment</div>
                            <small class="text-gray-400">UPI, Cards, Net Banking</small>
                        </div>
                    </div>
                    
                    <div class="payment-option" data-method="cod" onclick="selectPayment('cod')">
                        <div class="payment-icon">
                            <i class="fas fa-money-bill-wave"></i>
                        </div>
                        <div>
                            <div class="font-bold">Cash on Delivery</div>
                            <small class="text-gray-400">Pay when you receive</small>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-5">
                <!-- Order Summary -->
                <div class="checkout-section">
                    <div class="section-title">
                        <i class="fas fa-receipt"></i>
                        Order Summary
                    </div>
                    
                    <div id="orderItems" class="mb-4"></div>
                    
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="summarySubtotal">₹0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Fee</span>
                        <span id="summaryDelivery">₹50.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total Amount</span>
                        <span class="text-green-400" id="summaryTotal">₹50.00</span>
                    </div>
                    
                    <button class="btn-place-order" onclick="placeOrder()">
                        <i class="fas fa-check-circle mr-2"></i>Place Order
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    
    <script>
        let cart = [];
        let selectedPaymentMethod = 'online';
        let user = null;
        
        document.addEventListener('DOMContentLoaded', async function() {
            window.MedAISupabase.initSupabase();
            await checkAuth();
            loadCart();
            renderOrderSummary();
        });
        
        async function checkAuth() {
            const isAuth = await window.MedAIAuth.checkAuthState();
            if (!isAuth) {
                window.location.href = 'login.html';
                return;
            }
            
            user = JSON.parse(localStorage.getItem('medai_user') || '{}');
            
            // Pre-fill user data if available
            if (user.full_name) document.getElementById('fullName').value = user.full_name;
            if (user.phone) document.getElementById('phone').value = user.phone;
        }
        
        function loadCart() {
            cart = JSON.parse(localStorage.getItem('medai_cart') || '[]');
            
            if (cart.length === 0) {
                alert('Your cart is empty!');
                window.location.href = 'shop.html';
                return;
            }
        }
        
        function renderOrderSummary() {
            const itemsDiv = document.getElementById('orderItems');
            
            itemsDiv.innerHTML = cart.map(item => `
                <div class="order-item">
                    <div>
                        <div class="font-semibold">${item.name}</div>
                        <small class="text-gray-400">Qty: ${item.quantity}</small>
                    </div>
                    <div class="text-green-400 font-bold">₹${(item.price * item.quantity).toFixed(2)}</div>
                </div>
            `).join('');
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const delivery = 50;
            const total = subtotal + delivery;
            
            document.getElementById('summarySubtotal').textContent = `₹${subtotal.toFixed(2)}`;
            document.getElementById('summaryDelivery').textContent = `₹${delivery.toFixed(2)}`;
            document.getElementById('summaryTotal').textContent = `₹${total.toFixed(2)}`;
        }
        
        function selectPayment(method) {
            selectedPaymentMethod = method;
            document.querySelectorAll('.payment-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            document.querySelector(`[data-method="${method}"]`).classList.add('selected');
        }
        
        async function placeOrder() {
            // Validate address
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const city = document.getElementById('city').value.trim();
            const pincode = document.getElementById('pincode').value.trim();
            
            if (!fullName || !phone || !address || !city || !pincode) {
                alert('Please fill in all delivery address fields');
                return;
            }
            
            const deliveryAddress = { fullName, phone, address, city, pincode };
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const total = subtotal + 50;
            
            // Disable button
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Processing...';
            
            try {
                if (selectedPaymentMethod === 'online') {
                    // For now, treat online payment as COD (demo mode)
                    alert('Note: Payment gateway is in demo mode. Processing as COD.');
                    await createOrder(deliveryAddress, 'COD', null);
                } else {
                    // COD order
                    await createOrder(deliveryAddress, 'COD', null);
                }
            } catch (error) {
                console.error('Order error:', error);
                // Error already handled in createOrder
            }
        }
        
        async function initiateOnlinePayment(deliveryAddress, amount) {
            try {
                // Create Razorpay order
                const response = await fetch('http://localhost:5000/api/payment/create-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount })
                });
                
                const orderData = await response.json();
                
                if (!orderData.success) {
                    throw new Error('Failed to create payment order');
                }
                
                // Open Razorpay checkout
                const options = {
                    key: orderData.key_id,
                    amount: orderData.amount,
                    currency: orderData.currency,
                    name: 'MedAI Platform',
                    description: 'Medical Supplies Purchase',
                    order_id: orderData.order_id,
                    handler: async function(response) {
                        // Payment successful
                        await createOrder(deliveryAddress, 'Online', response.razorpay_payment_id);
                    },
                    prefill: {
                        name: user.full_name || '',
                        email: user.email || '',
                        contact: document.getElementById('phone').value
                    },
                    theme: {
                        color: '#cccccc'
                    },
                    modal: {
                        ondismiss: function() {
                            // Payment cancelled
                            const btn = document.querySelector('.btn-place-order');
                            btn.disabled = false;
                            btn.innerHTML = '<i class="fas fa-check-circle mr-2"></i>Place Order';
                        }
                    }
                };
                
                const razorpay = new Razorpay(options);
                razorpay.open();
                
            } catch (error) {
                console.error('Payment error:', error);
                throw error;
            }
        }
        
        async function createOrder(deliveryAddress, paymentMethod, paymentId) {
            try {
                const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const delivery_fee = 50;
                const total = subtotal + delivery_fee;
                
                // Create order directly in Supabase
                const orderData = {
                    user_id: user.id,
                    items: JSON.stringify(cart),
                    subtotal: subtotal,
                    delivery_fee: delivery_fee,
                    total: total,
                    payment_method: paymentMethod,
                    payment_status: paymentId ? 'completed' : 'pending',
                    payment_id: paymentId || null,
                    order_status: 'pending',
                    delivery_address: JSON.stringify(deliveryAddress),
                    created_at: new Date().toISOString()
                };
                
                const supabase = window.MedAISupabase.getSupabase();
                if (!supabase) throw new Error('Supabase not initialized');
                
                const { data, error } = await supabase
                    .from('orders')
                    .insert([orderData])
                    .select();
                
                if (error) throw error;
                
                const order = data[0];
                
                // Deduct stock for each item
                for (const item of cart) {
                    const { data: currentItem, error: fetchError } = await supabase
                        .from('inventory')
                        .select('quantity')
                        .eq('id', item.id)
                        .single();
                    
                    if (fetchError) {
                        console.error('Failed to fetch item:', fetchError);
                        continue;
                    }
                    
                    const newQuantity = currentItem.quantity - item.quantity;
                    
                    const { error: updateError } = await supabase
                        .from('inventory')
                        .update({ quantity: newQuantity })
                        .eq('id', item.id);
                    
                    if (updateError) {
                        console.error('Failed to update stock:', updateError);
                    }
                }
                
                // Clear cart
                localStorage.removeItem('medai_cart');
                
                // Show success message
                alert(`✅ Order Placed Successfully!\n\nOrder ID: #${order.id.substring(0, 8)}\n\nThank you for your order!`);
                
                // Redirect to orders page
                window.location.href = 'orders.html';
                
            } catch (error) {
                console.error('Create order error:', error);
                alert('Failed to place order: ' + error.message);
                // Re-enable button
                const btn = document.querySelector('.btn-place-order');
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check-circle mr-2"></i>Place Order';
                }
                throw error;
            }
        }
    </script>
    
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <script src="shapegrid.js"></script>
</body>
</html>
