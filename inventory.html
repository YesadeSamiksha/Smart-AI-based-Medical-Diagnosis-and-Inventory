<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Redirect file:// to localhost:8080 (required for ES modules & CORS) -->
    <script>
        if (window.location.protocol === 'file:') {
            var fileName = window.location.pathname.split('/').pop() || 'index.html';
            window.location.replace('http://localhost:8080/' + fileName);
        }
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="styles.css">
    
    <!-- Ballpit Background -->
    <link rel="stylesheet" href="ballpit.css">
    
    <style>
        body {
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
        }
        
        .inventory-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 20px;
        }
        
        .inventory-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .stat-label {
            color: #9ca3af;
            font-size: 14px;
        }
        
        .search-bar {
            width: 100%;
            padding: 12px 16px 12px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .inventory-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        
        .inventory-table thead th {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #9ca3af;
            font-size: 14px;
            text-transform: uppercase;
        }
        
        .inventory-table tbody tr {
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }
        
        .inventory-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.01);
        }
        
        .inventory-table tbody td {
            padding: 16px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .inventory-table tbody tr td:first-child {
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px 0 0 12px;
        }
        
        .inventory-table tbody tr td:last-child {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0 12px 12px 0;
        }
        
        .stock-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .stock-high {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        .stock-medium {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        
        .stock-low {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .action-btn {
            background: none;
            border: none;
            color: #8b5cf6;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            background: rgba(139, 92, 246, 0.2);
        }
        
        .btn-add {
            padding: 12px 24px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }
    </style>
</head>
<body>
    <!-- Ballpit Background Canvas -->
    <canvas id="ballpitCanvas"></canvas>
    
    <div class="inventory-container" style="position: relative; z-index: 1;">
        <!-- Back Button -->
        <a href="dashboard.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-white mb-6 transition-colors">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Dashboard</span>
        </a>
        
        <!-- Main Card -->
        <div class="inventory-card">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-4xl font-bold mb-2">Medical Inventory</h1>
                    <p class="text-gray-400">Manage medical supplies and equipment</p>
                </div>
                <button class="btn-add" onclick="showAddModal()">
                    <i class="fas fa-plus mr-2"></i>
                    Add Item
                </button>
            </div>
            
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value text-blue-400" id="totalItems">0</div>
                    <div class="stat-label">Total Items</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value text-red-400" id="lowStock">0</div>
                    <div class="stat-label">Low Stock</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value text-green-400" id="inStock">0</div>
                    <div class="stat-label">In Stock</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value text-yellow-400" id="mediumStock">0</div>
                    <div class="stat-label">Medium Stock</div>
                </div>
            </div>
            
            <!-- Search Bar -->
            <div style="position: relative;">
                <i class="fas fa-search" style="position: absolute; left: 16px; top: 16px; color: #9ca3af;"></i>
                <input type="text" id="searchBar" class="search-bar" placeholder="Search inventory...">
            </div>
            
            <!-- Inventory Table -->
            <div style="overflow-x: auto;">
                <table class="inventory-table">
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Category</th>
                            <th>Quantity</th>
                            <th>Unit</th>
                            <th>Status</th>
                            <th>Last Updated</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody">
                        <!-- Populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // Initialize variables
        let inventoryData = [];
        let isAdmin = false;
        
        // Initialize Supabase and load data
        document.addEventListener('DOMContentLoaded', async function() {
            window.MedAISupabase.initSupabase();
            
            // Check if user is admin
            const user = JSON.parse(localStorage.getItem('medai_user') || '{}');
            isAdmin = user.role === 'admin';
            
            await loadInventory();
            await loadStats();
        });
        
        // Load inventory from Supabase
        async function loadInventory(searchTerm = '') {
            try {
                const { data, error } = await window.MedAIInventory.getInventory(searchTerm);
                
                if (error) {
                    console.error('Error loading inventory:', error);
                    // Fall back to sample data
                    inventoryData = getSampleData();
                } else if (data && data.length > 0) {
                    inventoryData = data;
                } else {
                    // If no data in database, use sample data
                    inventoryData = getSampleData();
                }
                
                renderTable(inventoryData);
            } catch (err) {
                console.error('Error:', err);
                inventoryData = getSampleData();
                renderTable(inventoryData);
            }
        }
        
        // Load stats from Supabase
        async function loadStats() {
            try {
                const { data, error } = await window.MedAIInventory.getInventoryStats();
                
                if (data) {
                    document.getElementById('totalItems').textContent = data.totalItems;
                    document.getElementById('lowStock').textContent = data.lowStock;
                    document.getElementById('inStock').textContent = data.highStock;
                    document.getElementById('mediumStock').textContent = data.mediumStock;
                } else {
                    // Calculate from current data
                    updateStatsFromData();
                }
            } catch (err) {
                updateStatsFromData();
            }
        }
        
        function updateStatsFromData() {
            document.getElementById('totalItems').textContent = inventoryData.length;
            document.getElementById('lowStock').textContent = inventoryData.filter(i => i.status === 'low').length;
            document.getElementById('inStock').textContent = inventoryData.filter(i => i.status === 'high').length;
            document.getElementById('mediumStock').textContent = inventoryData.filter(i => i.status === 'medium').length;
        }
        
        // Sample data fallback
        function getSampleData() {
            return [
                { id: 1, name: 'Insulin (Novolog)', category: 'Medication', quantity: 145, unit: 'vials', status: 'high', updated_at: '2024-01-15' },
                { id: 2, name: 'Blood Pressure Monitor', category: 'Equipment', quantity: 8, unit: 'units', status: 'low', updated_at: '2024-01-14' },
                { id: 3, name: 'Glucose Test Strips', category: 'Supplies', quantity: 500, unit: 'strips', status: 'high', updated_at: '2024-01-15' },
                { id: 4, name: 'Surgical Gloves (M)', category: 'PPE', quantity: 2500, unit: 'pairs', status: 'high', updated_at: '2024-01-13' },
                { id: 5, name: 'Face Masks (N95)', category: 'PPE', quantity: 15, unit: 'boxes', status: 'low', updated_at: '2024-01-12' },
                { id: 6, name: 'Stethoscope', category: 'Equipment', quantity: 12, unit: 'units', status: 'medium', updated_at: '2024-01-11' },
                { id: 7, name: 'Thermometer (Digital)', category: 'Equipment', quantity: 25, unit: 'units', status: 'medium', updated_at: '2024-01-15' },
                { id: 8, name: 'Bandages (Assorted)', category: 'Supplies', quantity: 300, unit: 'boxes', status: 'high', updated_at: '2024-01-14' },
                { id: 9, name: 'Syringes (10mL)', category: 'Supplies', quantity: 450, unit: 'units', status: 'high', updated_at: '2024-01-13' },
                { id: 10, name: 'CT Scan Contrast Dye', category: 'Medication', quantity: 5, unit: 'bottles', status: 'low', updated_at: '2024-01-10' },
                { id: 11, name: 'Oxygen Cylinders', category: 'Equipment', quantity: 18, unit: 'tanks', status: 'medium', updated_at: '2024-01-15' },
                { id: 12, name: 'IV Drip Sets', category: 'Supplies', quantity: 200, unit: 'sets', status: 'high', updated_at: '2024-01-14' },
                { id: 13, name: 'Antibiotics (Amoxicillin)', category: 'Medication', quantity: 75, unit: 'bottles', status: 'medium', updated_at: '2024-01-12' },
                { id: 14, name: 'ECG Electrodes', category: 'Supplies', quantity: 1000, unit: 'pads', status: 'high', updated_at: '2024-01-15' },
                { id: 15, name: 'Wheelchair', category: 'Equipment', quantity: 4, unit: 'units', status: 'low', updated_at: '2024-01-09' }
            ];
        }
        
        // Render table
        function renderTable(data) {
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.category}</td>
                    <td><strong>${item.quantity}</strong></td>
                    <td>${item.unit}</td>
                    <td><span class="stock-badge stock-${item.status}">${item.status.toUpperCase()}</span></td>
                    <td>${formatDate(item.updated_at)}</td>
                    <td>
                        <button class="action-btn" onclick="editItem('${item.id}')">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="action-btn" onclick="deleteItem('${item.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            
            updateStatsFromData();
        }
        
        // Format date
        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
        
        // Search functionality
        document.getElementById('searchBar').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = inventoryData.filter(item => 
                item.name.toLowerCase().includes(searchTerm) ||
                item.category.toLowerCase().includes(searchTerm)
            );
            renderTable(filtered);
        });
        
        // Show add modal
        function showAddModal() {
            const name = prompt('Enter item name:');
            if (!name) return;
            
            const category = prompt('Enter category (Medication, Equipment, Supplies, PPE):');
            if (!category) return;
            
            const quantity = parseInt(prompt('Enter quantity:'));
            if (isNaN(quantity)) return;
            
            const unit = prompt('Enter unit (vials, units, boxes, etc.):');
            if (!unit) return;
            
            addItem({ name, category, quantity, unit });
        }
        
        // Add item
        async function addItem(item) {
            try {
                const { data, error } = await window.MedAIInventory.addInventoryItem(item);
                
                if (error) {
                    // Add locally if database fails
                    const newItem = {
                        id: Date.now(),
                        ...item,
                        status: window.MedAIInventory.calculateStockStatus(item.quantity, 10),
                        updated_at: new Date().toISOString()
                    };
                    inventoryData.push(newItem);
                    renderTable(inventoryData);
                    alert('Item added (local only - database error)');
                } else {
                    inventoryData.push(data);
                    renderTable(inventoryData);
                    alert('Item added successfully!');
                }
            } catch (err) {
                console.error('Error adding item:', err);
                alert('Error adding item');
            }
        }
        
        // Edit item
        async function editItem(id) {
            const item = inventoryData.find(i => i.id == id);
            if (!item) return;
            
            const newQuantity = prompt(`Enter new quantity for ${item.name}:`, item.quantity);
            if (newQuantity === null) return;
            
            const quantity = parseInt(newQuantity);
            if (isNaN(quantity)) {
                alert('Invalid quantity');
                return;
            }
            
            try {
                const { data, error } = await window.MedAIInventory.updateInventoryItem(id, { quantity });
                
                if (error) {
                    // Update locally if database fails
                    item.quantity = quantity;
                    item.status = window.MedAIInventory.calculateStockStatus(quantity, item.min_stock || 10);
                    renderTable(inventoryData);
                    alert('Item updated (local only)');
                } else {
                    const index = inventoryData.findIndex(i => i.id == id);
                    if (index >= 0) inventoryData[index] = data;
                    renderTable(inventoryData);
                    alert('Item updated successfully!');
                }
            } catch (err) {
                console.error('Error updating item:', err);
                alert('Error updating item');
            }
        }
        
        // Delete item
        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            
            try {
                const { error } = await window.MedAIInventory.deleteInventoryItem(id);
                
                if (error) {
                    // Delete locally if database fails
                    inventoryData = inventoryData.filter(i => i.id != id);
                    renderTable(inventoryData);
                    alert('Item deleted (local only)');
                } else {
                    inventoryData = inventoryData.filter(i => i.id != id);
                    renderTable(inventoryData);
                    alert('Item deleted successfully!');
                }
            } catch (err) {
                console.error('Error deleting item:', err);
                alert('Error deleting item');
            }
        }
    </script>
    
    <!-- Supabase Modules -->
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="inventory-db.js"></script>
    
    <!-- Three.js Import Map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    
    <!-- Ballpit Animation -->
    <script type="module" src="ballpit.js"></script>
</body>
</html>
