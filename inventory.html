<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Inventory - MedAI Admin</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    
    <style>
        body {
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
        }
        
        .inventory-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 20px;
        }
        
        .inventory-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .stat-label {
            color: #9ca3af;
            font-size: 14px;
        }
        
        .search-bar {
            width: 100%;
            padding: 12px 16px 12px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .inventory-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        
        .inventory-table thead th {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #9ca3af;
            font-size: 14px;
            text-transform: uppercase;
        }
        
        .inventory-table tbody tr {
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }
        
        .inventory-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.01);
        }
        
        .inventory-table tbody td {
            padding: 16px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .inventory-table tbody tr td:first-child {
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px 0 0 12px;
        }
        
        .inventory-table tbody tr td:last-child {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0 12px 12px 0;
        }
        
        .stock-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .stock-high {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        .stock-medium {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        
        .stock-low {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .action-btn {
            background: none;
            border: none;
            color: #8b5cf6;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            background: rgba(139, 92, 246, 0.2);
        }
        
        .btn-add {
            padding: 12px 24px;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }
    </style>
</head>
<body>
    <div class="inventory-container">
        <!-- Back Button -->
        <a href="dashboard.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-white mb-6 transition-colors">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Dashboard</span>
        </a>
        
        <!-- Main Card -->
        <div class="inventory-card">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-4xl font-bold mb-2">Medical Inventory</h1>
                    <p class="text-gray-400">Manage medical supplies and equipment</p>
                </div>
                <button class="btn-add" onclick="alert('Add Item functionality coming soon!')">
                    <i class="fas fa-plus mr-2"></i>
                    Add Item
                </button>
            </div>
            
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value text-blue-400">247</div>
                    <div class="stat-label">Total Items</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value text-red-400">12</div>
                    <div class="stat-label">Low Stock</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value text-green-400">185</div>
                    <div class="stat-label">In Stock</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value text-yellow-400">$45,230</div>
                    <div class="stat-label">Total Value</div>
                </div>
            </div>
            
            <!-- Search Bar -->
            <div style="position: relative;">
                <i class="fas fa-search" style="position: absolute; left: 16px; top: 16px; color: #9ca3af;"></i>
                <input type="text" id="searchBar" class="search-bar" placeholder="Search inventory...">
            </div>
            
            <!-- Inventory Table -->
            <div style="overflow-x: auto;">
                <table class="inventory-table">
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Category</th>
                            <th>Quantity</th>
                            <th>Unit</th>
                            <th>Status</th>
                            <th>Last Updated</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody">
                        <!-- Populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // Sample inventory data
        const inventoryData = [
            { id: 1, name: 'Insulin (Novolog)', category: 'Medication', quantity: 145, unit: 'vials', status: 'high', lastUpdated: '2024-01-15' },
            { id: 2, name: 'Blood Pressure Monitor', category: 'Equipment', quantity: 8, unit: 'units', status: 'low', lastUpdated: '2024-01-14' },
            { id: 3, name: 'Glucose Test Strips', category: 'Supplies', quantity: 500, unit: 'strips', status: 'high', lastUpdated: '2024-01-15' },
            { id: 4, name: 'Surgical Gloves (M)', category: 'PPE', quantity: 2500, unit: 'pairs', status: 'high', lastUpdated: '2024-01-13' },
            { id: 5, name: 'Face Masks (N95)', category: 'PPE', quantity: 15, unit: 'boxes', status: 'low', lastUpdated: '2024-01-12' },
            { id: 6, name: 'Stethoscope', category: 'Equipment', quantity: 12, unit: 'units', status: 'medium', lastUpdated: '2024-01-11' },
            { id: 7, name: 'Thermometer (Digital)', category: 'Equipment', quantity: 25, unit: 'units', status: 'medium', lastUpdated: '2024-01-15' },
            { id: 8, name: 'Bandages (Assorted)', category: 'Supplies', quantity: 300, unit: 'boxes', status: 'high', lastUpdated: '2024-01-14' },
            { id: 9, name: 'Syringes (10mL)', category: 'Supplies', quantity: 450, unit: 'units', status: 'high', lastUpdated: '2024-01-13' },
            { id: 10, name: 'CT Scan Contrast Dye', category: 'Medication', quantity: 5, unit: 'bottles', status: 'low', lastUpdated: '2024-01-10' },
            { id: 11, name: 'Oxygen Cylinders', category: 'Equipment', quantity: 18, unit: 'tanks', status: 'medium', lastUpdated: '2024-01-15' },
            { id: 12, name: 'IV Drip Sets', category: 'Supplies', quantity: 200, unit: 'sets', status: 'high', lastUpdated: '2024-01-14' },
            { id: 13, name: 'Antibiotics (Amoxicillin)', category: 'Medication', quantity: 75, unit: 'bottles', status: 'medium', lastUpdated: '2024-01-12' },
            { id: 14, name: 'ECG Electrodes', category: 'Supplies', quantity: 1000, unit: 'pads', status: 'high', lastUpdated: '2024-01-15' },
            { id: 15, name: 'Wheelchair', category: 'Equipment', quantity: 4, unit: 'units', status: 'low', lastUpdated: '2024-01-09' }
        ];
        
        // Render table
        function renderTable(data) {
            const tbody = document.getElementById('inventoryTableBody');
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.category}</td>
                    <td><strong>${item.quantity}</strong></td>
                    <td>${item.unit}</td>
                    <td><span class="stock-badge stock-${item.status}">${item.status.toUpperCase()}</span></td>
                    <td>${formatDate(item.lastUpdated)}</td>
                    <td>
                        <button class="action-btn" onclick="editItem(${item.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="action-btn" onclick="deleteItem(${item.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        // Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
        
        // Search functionality
        document.getElementById('searchBar').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = inventoryData.filter(item => 
                item.name.toLowerCase().includes(searchTerm) ||
                item.category.toLowerCase().includes(searchTerm)
            );
            renderTable(filtered);
        });
        
        // Item actions
        function editItem(id) {
            alert(`Edit item ${id} - functionality coming soon!`);
        }
        
        function deleteItem(id) {
            if (confirm('Are you sure you want to delete this item?')) {
                alert(`Item ${id} deleted - functionality coming soon!`);
            }
        }
        
        // Initial render
        renderTable(inventoryData);
    </script>
</body>
</html>
