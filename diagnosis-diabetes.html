<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Redirect file:// to localhost:8080 (required for ES modules & CORS) -->
    <script>
        if (window.location.protocol === 'file:') {
            var fileName = window.location.pathname.split('/').pop() || 'index.html';
            window.location.replace('http://localhost:8080/' + fileName);
        }
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="ballpit.css">
    
    <style>
        body { background: #0a0a0f; color: #ffffff; min-height: 100vh; }
        .diagnosis-container { max-width: 900px; margin: 80px auto 50px; padding: 20px; position: relative; z-index: 10; }
        .diagnosis-card {
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        .section-title { color: #6366f1; font-weight: 600; margin: 24px 0 16px; padding-bottom: 8px; border-bottom: 1px solid rgba(99, 102, 241, 0.3); }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 500; color: #e5e7eb; }
        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .form-input:focus, .form-select:focus { outline: none; border-color: #6366f1; background: rgba(255, 255, 255, 0.08); }
        .form-select option { background: #1a1a2e; color: white; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .row-2, .row-3 { grid-template-columns: 1fr; } }
        .btn-diagnose {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        .btn-diagnose:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
        .btn-diagnose:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .result-card {
            margin-top: 30px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: none;
        }
        .result-card.show { display: block; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .risk-level { font-size: 28px; font-weight: 700; margin-bottom: 16px; }
        .risk-low { color: #10b981; }
        .risk-medium { color: #f59e0b; }
        .risk-high { color: #ef4444; }
        .bmi-result { background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 12px; padding: 16px; margin-top: 20px; }
        .probability-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin: 12px 0; }
        .probability-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .api-status { font-size: 12px; color: #9ca3af; margin-top: 8px; }
    </style>
</head>
<body>
    <canvas id="ballpitCanvas"></canvas>
    
    <div class="diagnosis-container">
        <a href="dashboard.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-white mb-6 transition-colors">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Dashboard</span>
        </a>
        
        <div class="diagnosis-card">
            <div class="text-center mb-8">
                <i class="fas fa-heartbeat text-6xl text-pink-400 mb-4"></i>
                <h1 class="text-4xl font-bold mb-2">Diabetes Risk Assessment</h1>
                <p class="text-gray-400">Complete the form below for an AI-powered diabetes risk analysis</p>
            </div>
            
            <form id="diabetesForm">
                <!-- Personal Information -->
                <h3 class="section-title"><i class="fas fa-user me-2"></i>Personal Information</h3>
                <div class="row-3">
                    <div class="form-group">
                        <label class="form-label">Age *</label>
                        <input type="number" id="age" class="form-input" placeholder="e.g., 45" min="18" max="100" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Gender *</label>
                        <select id="gender" class="form-select" required>
                            <option value="">Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Family History of Diabetes *</label>
                        <select id="family_history" class="form-select" required>
                            <option value="">Select</option>
                            <option value="yes">Yes</option>
                            <option value="no">No</option>
                        </select>
                    </div>
                </div>
                
                <!-- BMI Section -->
                <h3 class="section-title"><i class="fas fa-weight me-2"></i>BMI Information</h3>
                <div class="form-group">
                    <label class="form-label">Do you know your BMI?</label>
                    <select id="bmi_known" class="form-select" onchange="toggleBMIFields()">
                        <option value="no">No, calculate from weight/height</option>
                        <option value="yes">Yes, I know my BMI</option>
                    </select>
                </div>
                <div id="bmi_direct" class="form-group" style="display:none;">
                    <label class="form-label">Enter your BMI *</label>
                    <input type="number" step="0.1" id="bmi" class="form-input" placeholder="e.g., 25.5" min="10" max="60">
                </div>
                <div id="bmi_calc" class="row-2">
                    <div class="form-group">
                        <label class="form-label">Weight (kg) *</label>
                        <input type="number" step="0.1" id="weight" class="form-input" placeholder="e.g., 70" min="20" max="300">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Height (cm) *</label>
                        <input type="number" step="0.1" id="height" class="form-input" placeholder="e.g., 170" min="100" max="250">
                    </div>
                </div>
                
                <!-- Lifestyle Factors -->
                <h3 class="section-title"><i class="fas fa-running me-2"></i>Lifestyle Factors</h3>
                <div class="row-2">
                    <div class="form-group">
                        <label class="form-label">Physical Activity Level *</label>
                        <select id="physical_activity" class="form-select" required>
                            <option value="">Select</option>
                            <option value="sedentary">Sedentary (little or no exercise)</option>
                            <option value="light">Light (1-3 days/week)</option>
                            <option value="moderate">Moderate (3-5 days/week)</option>
                            <option value="active">Active (6-7 days/week)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Diet Quality *</label>
                        <select id="diet_quality" class="form-select" required>
                            <option value="">Select</option>
                            <option value="poor">Poor (high processed foods)</option>
                            <option value="fair">Fair (some healthy choices)</option>
                            <option value="good">Good (mostly balanced)</option>
                            <option value="excellent">Excellent (very healthy)</option>
                        </select>
                    </div>
                </div>
                <div class="row-3">
                    <div class="form-group">
                        <label class="form-label">Smoking Status *</label>
                        <select id="smoking" class="form-select" required>
                            <option value="">Select</option>
                            <option value="no">Never</option>
                            <option value="former">Former smoker</option>
                            <option value="yes">Current smoker</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Alcohol Consumption</label>
                        <select id="alcohol" class="form-select">
                            <option value="no">None/Rarely</option>
                            <option value="moderate">Moderate</option>
                            <option value="heavy">Heavy</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Stress Level *</label>
                        <select id="stress_level" class="form-select" required>
                            <option value="">Select</option>
                            <option value="low">Low</option>
                            <option value="moderate">Moderate</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Average Sleep Hours</label>
                    <input type="number" step="0.5" id="sleep_hours" class="form-input" placeholder="e.g., 7" min="3" max="12" value="7">
                </div>
                
                <!-- Symptoms -->
                <h3 class="section-title"><i class="fas fa-stethoscope me-2"></i>Symptoms (Select if present)</h3>
                <div class="row-2">
                    <div class="form-group">
                        <label class="form-label">Frequent Urination *</label>
                        <select id="frequent_urination" class="form-select" required>
                            <option value="no">No</option>
                            <option value="yes">Yes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Excessive Thirst *</label>
                        <select id="excessive_thirst" class="form-select" required>
                            <option value="no">No</option>
                            <option value="yes">Yes</option>
                        </select>
                    </div>
                </div>
                <div class="row-2">
                    <div class="form-group">
                        <label class="form-label">Unexplained Tiredness *</label>
                        <select id="tiredness" class="form-select" required>
                            <option value="no">No</option>
                            <option value="yes">Yes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Blurred Vision *</label>
                        <select id="blurred_vision" class="form-select" required>
                            <option value="no">No</option>
                            <option value="yes">Yes</option>
                        </select>
                    </div>
                </div>
                <div class="row-3">
                    <div class="form-group">
                        <label class="form-label">Slow Wound Healing *</label>
                        <select id="slow_healing" class="form-select" required>
                            <option value="no">No</option>
                            <option value="yes">Yes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Dark Skin Patches *</label>
                        <select id="dark_skin_patches" class="form-select" required>
                            <option value="no">No</option>
                            <option value="yes">Yes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Frequent Infections *</label>
                        <select id="frequent_infections" class="form-select" required>
                            <option value="no">No</option>
                            <option value="yes">Yes</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="btn-diagnose" id="submitBtn">
                    <i class="fas fa-brain mr-2"></i>
                    Analyze Diabetes Risk
                </button>
            </form>
            
            <!-- Result Card -->
            <div id="resultCard" class="result-card">
                <h3 class="text-2xl font-bold mb-4"><i class="fas fa-chart-pie me-2"></i>Analysis Results</h3>
                <div id="riskLevel" class="risk-level"></div>
                <div class="probability-bar">
                    <div id="probabilityFill" class="probability-fill"></div>
                </div>
                <div id="probabilityText" class="text-gray-400 mb-4"></div>
                <div id="bmiResult" class="bmi-result" style="display:none;"></div>
                <div id="riskDescription" class="text-gray-300 mb-4 mt-4"></div>
                <div id="recommendations" class="mt-4"></div>
                <p id="apiStatus" class="api-status"></p>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5000';
        
        function toggleBMIFields() {
            const bmiKnown = document.getElementById('bmi_known').value;
            document.getElementById('bmi_direct').style.display = bmiKnown === 'yes' ? 'block' : 'none';
            document.getElementById('bmi_calc').style.display = bmiKnown === 'yes' ? 'none' : 'grid';
        }
        
        document.getElementById('diabetesForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Analyzing...';
            btn.disabled = true;
            
            // Collect form data
            const formData = {
                age: parseInt(document.getElementById('age').value),
                gender: document.getElementById('gender').value,
                family_history: document.getElementById('family_history').value,
                physical_activity: document.getElementById('physical_activity').value,
                diet_quality: document.getElementById('diet_quality').value,
                smoking: document.getElementById('smoking').value,
                alcohol: document.getElementById('alcohol').value,
                stress_level: document.getElementById('stress_level').value,
                sleep_hours: parseFloat(document.getElementById('sleep_hours').value) || 7,
                frequent_urination: document.getElementById('frequent_urination').value,
                excessive_thirst: document.getElementById('excessive_thirst').value,
                tiredness: document.getElementById('tiredness').value,
                blurred_vision: document.getElementById('blurred_vision').value,
                slow_healing: document.getElementById('slow_healing').value,
                dark_skin_patches: document.getElementById('dark_skin_patches').value,
                frequent_infections: document.getElementById('frequent_infections').value
            };
            
            // Handle BMI
            if (document.getElementById('bmi_known').value === 'yes') {
                formData.bmi = parseFloat(document.getElementById('bmi').value);
            } else {
                formData.weight = parseFloat(document.getElementById('weight').value);
                formData.height = parseFloat(document.getElementById('height').value);
            }
            
            let result;
            let usedAPI = false;
            
            try {
                // Try API first
                const response = await fetch(`${API_BASE}/api/diabetes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    result = await response.json();
                    usedAPI = true;
                } else {
                    throw new Error('API error');
                }
            } catch (err) {
                console.log('API not available, using client-side prediction');
                result = clientSidePrediction(formData);
            }
            
            // Save to Supabase
            try {
                if (window.MedAIDatabase) {
                    await window.MedAIDatabase.saveDiagnosisResult('diabetes', formData, result, result.risk_level);
                }
            } catch (err) {
                console.error('Error saving to database:', err);
            }
            
            // Display results
            displayResults(result, usedAPI);
            
            btn.innerHTML = '<i class="fas fa-brain mr-2"></i> Analyze Diabetes Risk';
            btn.disabled = false;
        });
        
        function clientSidePrediction(data) {
            let score = 0;
            const factors = {};
            const age = data.age || 0;
            const bmi = data.bmi || (data.weight && data.height ? data.weight / Math.pow(data.height/100, 2) : 25);
            
            // Age scoring (more granular)
            if (age >= 65) { score += 4; factors.age = 'Very High Risk'; }
            else if (age >= 55) { score += 3; factors.age = 'High Risk'; }
            else if (age >= 45) { score += 2; factors.age = 'Moderate Risk'; }
            else if (age >= 35) { score += 1; factors.age = 'Mild Risk'; }
            else { factors.age = 'Low Risk'; }
            
            // BMI scoring with clinical thresholds
            if (bmi >= 35) { score += 5; factors.bmi = 'Severe Obesity (Class II+)'; }
            else if (bmi >= 30) { score += 4; factors.bmi = 'Obese (Class I)'; }
            else if (bmi >= 27.5) { score += 3; factors.bmi = 'Overweight (High)'; }
            else if (bmi >= 25) { score += 2; factors.bmi = 'Overweight'; }
            else if (bmi >= 23) { score += 1; factors.bmi = 'Pre-overweight'; }
            else if (bmi < 18.5) { score += 1; factors.bmi = 'Underweight'; }
            else { factors.bmi = 'Normal'; }
            
            // Family history (strong predictor)
            if (data.family_history === 'yes') { score += 4; factors.family = 'Positive History'; }
            
            // Lifestyle factors
            if (data.physical_activity === 'sedentary') { score += 3; factors.activity = 'Sedentary'; }
            else if (data.physical_activity === 'light') { score += 2; factors.activity = 'Light Activity'; }
            else if (data.physical_activity === 'moderate') { score += 1; factors.activity = 'Moderate Activity'; }
            
            if (data.diet_quality === 'poor') { score += 3; factors.diet = 'Poor'; }
            else if (data.diet_quality === 'average') { score += 1; factors.diet = 'Average'; }
            
            if (data.smoking === 'yes') { score += 2; factors.smoking = 'Current Smoker'; }
            if (data.alcohol === 'heavy') { score += 2; factors.alcohol = 'Heavy Drinker'; }
            else if (data.alcohol === 'moderate') { score += 1; factors.alcohol = 'Moderate'; }
            
            if (data.stress_level === 'high') { score += 2; factors.stress = 'High Stress'; }
            else if (data.stress_level === 'medium') { score += 1; factors.stress = 'Medium Stress'; }
            
            // Sleep (important for glucose regulation)
            const sleep = data.sleep_hours || 7;
            if (sleep < 5 || sleep > 9) { score += 2; factors.sleep = 'Poor Sleep'; }
            else if (sleep < 6 || sleep > 8) { score += 1; factors.sleep = 'Suboptimal Sleep'; }
            
            // Symptoms (weighted by clinical significance)
            const symptomsWeight = {
                frequent_urination: 2,
                excessive_thirst: 2,
                tiredness: 1,
                blurred_vision: 2,
                slow_healing: 2,
                dark_skin_patches: 2, // Acanthosis nigricans
                frequent_infections: 1
            };
            
            let symptomCount = 0;
            let symptomScore = 0;
            Object.keys(symptomsWeight).forEach(s => {
                if (data[s] === 'yes') {
                    symptomCount++;
                    symptomScore += symptomsWeight[s];
                }
            });
            score += symptomScore;
            factors.symptoms = symptomCount > 0 ? `${symptomCount} symptoms present` : 'No concerning symptoms';
            
            // Calculate probability with sigmoid scaling for more realistic distribution
            const maxScore = 30;
            const rawProbability = (score / maxScore) * 100;
            // Apply sigmoid transformation for smoother probability curve
            const probability = Math.min(Math.round(100 / (1 + Math.exp(-0.1 * (score - 12)))), 95);
            
            let risk_level, prediction, severity;
            if (probability >= 60 || score >= 18) { 
                risk_level = 'high'; 
                prediction = 'High Risk'; 
                severity = 3;
            } else if (probability >= 35 || score >= 10) { 
                risk_level = 'medium'; 
                prediction = 'Moderate Risk'; 
                severity = 2;
            } else { 
                risk_level = 'low'; 
                prediction = 'Low Risk'; 
                severity = 1;
            }
            
            return {
                prediction,
                probability,
                risk_level,
                severity,
                score,
                maxScore,
                bmi: Math.round(bmi * 10) / 10,
                bmi_category: bmi < 18.5 ? 'Underweight' : bmi < 25 ? 'Normal' : bmi < 30 ? 'Overweight' : bmi < 35 ? 'Obese Class I' : 'Obese Class II+',
                factors,
                symptomCount,
                model_type: 'Enhanced Clinical Algorithm'
            };
        }
        
        function displayResults(result, usedAPI) {
            const resultCard = document.getElementById('resultCard');
            const riskLevel = document.getElementById('riskLevel');
            const probabilityFill = document.getElementById('probabilityFill');
            const probabilityText = document.getElementById('probabilityText');
            const bmiResult = document.getElementById('bmiResult');
            const riskDescription = document.getElementById('riskDescription');
            const recommendations = document.getElementById('recommendations');
            const apiStatus = document.getElementById('apiStatus');
            
            const level = result.prediction || result.risk_level;
            const prob = result.probability || 0;
            
            let className = 'risk-low';
            let color = '#10b981';
            if (level.toLowerCase().includes('high')) { className = 'risk-high'; color = '#ef4444'; }
            else if (level.toLowerCase().includes('medium') || level.toLowerCase().includes('moderate')) { className = 'risk-medium'; color = '#f59e0b'; }
            
            riskLevel.textContent = level;
            riskLevel.className = `risk-level ${className}`;
            
            probabilityFill.style.width = `${prob}%`;
            probabilityFill.style.background = color;
            probabilityText.textContent = `Risk Probability: ${prob}%`;
            
            if (result.bmi) {
                bmiResult.style.display = 'block';
                bmiResult.innerHTML = `<strong>Your BMI:</strong> ${result.bmi} (${result.bmi_category || ''})`;
            }
            
            const descriptions = {
                high: 'Based on your inputs, you show several indicators associated with increased diabetes risk. Please consult a healthcare professional.',
                medium: 'You show some indicators that warrant attention. Lifestyle modifications are recommended.',
                low: 'Your current profile shows low diabetes risk. Keep up your healthy habits!'
            };
            
            const recsData = {
                high: ['Consult an endocrinologist immediately', 'Get a comprehensive metabolic panel', 'Start monitoring blood glucose daily', 'Reduce carbs and sugar intake', 'Exercise at least 30 mins/day'],
                medium: ['Schedule a check-up with your doctor', 'Monitor blood glucose periodically', 'Maintain a healthy diet', 'Exercise regularly (150 mins/week)', 'Manage stress and sleep well'],
                low: ['Continue healthy lifestyle', 'Annual health check-ups recommended', 'Stay physically active', 'Maintain balanced diet', 'Keep stress levels low']
            };
            
            const riskKey = result.risk_level || 'low';
            riskDescription.textContent = descriptions[riskKey] || descriptions.low;
            
            const recs = recsData[riskKey] || recsData.low;
            const recColor = riskKey === 'high' ? 'red' : riskKey === 'medium' ? 'yellow' : 'green';
            recommendations.innerHTML = `
                <div class="bg-${recColor}-500 bg-opacity-10 border border-${recColor}-500 rounded-lg p-4">
                    <h4 class="font-bold mb-2"><i class="fas fa-lightbulb mr-2"></i>Recommendations</h4>
                    <ul class="list-disc list-inside space-y-1">
                        ${recs.map(r => `<li>${r}</li>`).join('')}
                    </ul>
                </div>
            `;
            
            // Add factor analysis if available
            if (result.factors && result.factors.length > 0) {
                recommendations.innerHTML += `
                    <div class="bg-gray-800 bg-opacity-50 border border-gray-600 rounded-lg p-4 mt-4">
                        <h4 class="font-bold mb-3"><i class="fas fa-chart-bar mr-2"></i>Risk Factor Analysis</h4>
                        <div class="text-sm space-y-2">
                            <p class="text-gray-400">Score: <span class="text-white font-bold">${result.score}/${result.maxScore || 30}</span> points</p>
                            ${result.symptomCount > 0 ? `<p class="text-yellow-400"><i class="fas fa-exclamation-triangle mr-1"></i>${result.symptomCount} symptom(s) detected</p>` : ''}
                            <p class="text-gray-400">Identified factors:</p>
                            <ul class="list-disc list-inside text-gray-300">
                                ${result.factors.map(f => `<li>${f}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                `;
            }
            
            apiStatus.textContent = usedAPI ? `Analysis by: ${result.model_type || 'ML'} model (Backend API)` : `Analysis by: ${result.model_type || 'Client-side algorithm'}`;
            
            resultCard.classList.add('show');
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
    
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
