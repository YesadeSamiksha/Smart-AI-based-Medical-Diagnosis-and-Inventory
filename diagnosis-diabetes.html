<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Assessment - MedAI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    
    <style>
        body {
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
        }
        
        .diagnosis-container {
            max-width: 800px;
            margin: 100px auto 50px;
            padding: 20px;
        }
        
        .diagnosis-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e5e7eb;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.08);
        }
        
        .btn-diagnose {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-diagnose:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }
        
        .result-card {
            margin-top: 30px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: none;
        }
        
        .result-card.show {
            display: block;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .risk-level {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        
        .risk-low { color: #10b981; }
        .risk-medium { color: #f59e0b; }
        .risk-high { color: #ef4444; }
    </style>
</head>
<body>
    <div class="diagnosis-container">
        <!-- Back Button -->
        <a href="index.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-white mb-6 transition-colors">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Home</span>
        </a>
        
        <!-- Main Card -->
        <div class="diagnosis-card">
            <div class="text-center mb-8">
                <i class="fas fa-heartbeat text-6xl text-pink-400 mb-4"></i>
                <h1 class="text-4xl font-bold mb-2">Diabetes Risk Assessment</h1>
                <p class="text-gray-400">Enter your health metrics for an AI-powered diabetes risk analysis</p>
            </div>
            
            <form id="diabetesForm">
                <div class="form-group">
                    <label class="form-label" for="glucose">Glucose Level (mg/dL)</label>
                    <input type="number" id="glucose" class="form-input" placeholder="e.g., 120" min="0" max="300" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="bmi">BMI (Body Mass Index)</label>
                    <input type="number" step="0.1" id="bmi" class="form-input" placeholder="e.g., 25.5" min="10" max="60" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="age">Age (years)</label>
                    <input type="number" id="age" class="form-input" placeholder="e.g., 45" min="1" max="120" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="insulin">Insulin Level (μU/mL)</label>
                    <input type="number" id="insulin" class="form-input" placeholder="e.g., 80" min="0" max="900" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="bloodPressure">Blood Pressure (mm Hg)</label>
                    <input type="number" id="bloodPressure" class="form-input" placeholder="e.g., 72" min="40" max="200" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="skinThickness">Skin Thickness (mm)</label>
                    <input type="number" id="skinThickness" class="form-input" placeholder="e.g., 20" min="0" max="100" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="pregnancies">Number of Pregnancies</label>
                    <input type="number" id="pregnancies" class="form-input" placeholder="e.g., 0" min="0" max="20" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="diabetesPedigree">Diabetes Pedigree Function</label>
                    <input type="number" step="0.001" id="diabetesPedigree" class="form-input" placeholder="e.g., 0.5" min="0" max="3" required>
                </div>
                
                <button type="submit" class="btn-diagnose">
                    <i class="fas fa-brain mr-2"></i>
                    Analyze Risk
                </button>
            </form>
            
            <!-- Result Card -->
            <div id="resultCard" class="result-card">
                <h3 class="text-2xl font-bold mb-4">Analysis Results</h3>
                <div id="riskLevel" class="risk-level"></div>
                <div id="riskDescription" class="text-gray-300 mb-4"></div>
                <div id="recommendations" class="mt-4"></div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('diabetesForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Collect form data
            const formData = {
                glucose: parseFloat(document.getElementById('glucose').value),
                bmi: parseFloat(document.getElementById('bmi').value),
                age: parseInt(document.getElementById('age').value),
                insulin: parseFloat(document.getElementById('insulin').value),
                bloodPressure: parseFloat(document.getElementById('bloodPressure').value),
                skinThickness: parseFloat(document.getElementById('skinThickness').value),
                pregnancies: parseInt(document.getElementById('pregnancies').value),
                diabetesPedigree: parseFloat(document.getElementById('diabetesPedigree').value)
            };
            
            // Show loading state
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Analyzing...';
            btn.disabled = true;
            
            // Simulate AI analysis (replace with actual API call)
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // Calculate risk (simplified algorithm for demo)
            const riskScore = calculateDiabetesRisk(formData);
            
            // Display results
            displayResults(riskScore);
            
            // Reset button
            btn.innerHTML = '<i class="fas fa-brain mr-2"></i> Analyze Risk';
            btn.disabled = false;
        });
        
        function calculateDiabetesRisk(data) {
            let score = 0;
            
            // Glucose risk
            if (data.glucose > 140) score += 3;
            else if (data.glucose > 100) score += 2;
            else if (data.glucose > 80) score += 1;
            
            // BMI risk
            if (data.bmi > 30) score += 3;
            else if (data.bmi > 25) score += 2;
            else if (data.bmi > 22) score += 1;
            
            // Age risk
            if (data.age > 60) score += 2;
            else if (data.age > 45) score += 1;
            
            // Insulin risk
            if (data.insulin > 200) score += 2;
            else if (data.insulin > 100) score += 1;
            
            // Blood pressure risk
            if (data.bloodPressure > 90) score += 2;
            else if (data.bloodPressure > 80) score += 1;
            
            // Pedigree risk
            if (data.diabetesPedigree > 0.8) score += 2;
            else if (data.diabetesPedigree > 0.5) score += 1;
            
            return score;
        }
        
        function displayResults(score) {
            const resultCard = document.getElementById('resultCard');
            const riskLevel = document.getElementById('riskLevel');
            const riskDescription = document.getElementById('riskDescription');
            const recommendations = document.getElementById('recommendations');
            
            let level, description, recs, className;
            
            if (score >= 10) {
                level = 'High Risk';
                className = 'risk-high';
                description = 'Based on your health metrics, you show several indicators associated with increased diabetes risk.';
                recs = `
                    <div class="bg-red-500 bg-opacity-10 border border-red-500 rounded-lg p-4">
                        <h4 class="font-bold mb-2"><i class="fas fa-exclamation-triangle mr-2"></i>Immediate Action Recommended</h4>
                        <ul class="list-disc list-inside space-y-1">
                            <li>Consult with an endocrinologist immediately</li>
                            <li>Get a comprehensive metabolic panel done</li>
                            <li>Start monitoring blood glucose daily</li>
                            <li>Consider dietary changes (reduce carbs and sugar)</li>
                            <li>Increase physical activity to at least 30 mins/day</li>
                        </ul>
                    </div>
                `;
            } else if (score >= 6) {
                level = 'Moderate Risk';
                className = 'risk-medium';
                description = 'You show some indicators that warrant attention and lifestyle modifications.';
                recs = `
                    <div class="bg-yellow-500 bg-opacity-10 border border-yellow-500 rounded-lg p-4">
                        <h4 class="font-bold mb-2"><i class="fas fa-lightbulb mr-2"></i>Preventive Measures</h4>
                        <ul class="list-disc list-inside space-y-1">
                            <li>Schedule a check-up with your doctor</li>
                            <li>Monitor your blood glucose periodically</li>
                            <li>Maintain a healthy diet with whole grains and vegetables</li>
                            <li>Exercise regularly (150 mins/week recommended)</li>
                            <li>Manage stress and get adequate sleep</li>
                        </ul>
                    </div>
                `;
            } else {
                level = 'Low Risk';
                className = 'risk-low';
                description = 'Your current health metrics show low diabetes risk. Keep up the good work!';
                recs = `
                    <div class="bg-green-500 bg-opacity-10 border border-green-500 rounded-lg p-4">
                        <h4 class="font-bold mb-2"><i class="fas fa-check-circle mr-2"></i>Maintenance Tips</h4>
                        <ul class="list-disc list-inside space-y-1">
                            <li>Continue your healthy lifestyle habits</li>
                            <li>Annual health check-ups recommended</li>
                            <li>Stay physically active</li>
                            <li>Maintain a balanced diet</li>
                            <li>Keep stress levels in check</li>
                        </ul>
                    </div>
                `;
            }
            
            riskLevel.textContent = level;
            riskLevel.className = `risk-level ${className}`;
            riskDescription.textContent = description;
            recommendations.innerHTML = recs;
            
            resultCard.classList.add('show');
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
