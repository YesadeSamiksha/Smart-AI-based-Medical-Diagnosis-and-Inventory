<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Pressure Assessment - MedAI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="styles.css">
    
    <!-- Ballpit Background -->
    <link rel="stylesheet" href="ballpit.css">
    
    <style>
        body {
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
        }
        
        .diagnosis-container {
            max-width: 900px;
            margin: 100px auto 50px;
            padding: 20px;
        }
        
        .diagnosis-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e5e7eb;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #ef4444;
            background: rgba(255, 255, 255, 0.08);
        }
        
        .bp-inputs {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: center;
        }
        
        .bp-separator {
            font-size: 24px;
            font-weight: bold;
            color: #ef4444;
        }
        
        .btn-diagnose {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-diagnose:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
        }
        
        .result-card {
            margin-top: 30px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: none;
        }
        
        .result-card.show {
            display: block;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .bp-gauge {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 30px;
        }
        
        .bp-category {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .cat-normal { color: #10b981; }
        .cat-elevated { color: #fbbf24; }
        .cat-hypertension1 { color: #f59e0b; }
        .cat-hypertension2 { color: #ef4444; }
        .cat-crisis { color: #dc2626; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Ballpit Background Canvas -->
    <canvas id="ballpitCanvas"></canvas>
    
    <div class="diagnosis-container" style="position: relative; z-index: 1;">
        <!-- Back Button -->
        <a href="dashboard.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-white mb-6 transition-colors">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Dashboard</span>
        </a>
        
        <!-- Main Card -->
        <div class="diagnosis-card">
            <div class="text-center mb-8">
                <i class="fas fa-heartbeat text-6xl text-red-400 mb-4"></i>
                <h1 class="text-4xl font-bold mb-2">Blood Pressure Assessment</h1>
                <p class="text-gray-400">Enter your readings for instant analysis and personalized recommendations</p>
            </div>
            
            <form id="bpForm">
                <div class="form-group">
                    <label class="form-label">Blood Pressure Reading (mm Hg)</label>
                    <div class="bp-inputs">
                        <input type="number" id="systolic" class="form-input" placeholder="Systolic (top)" min="60" max="250" required>
                        <span class="bp-separator">/</span>
                        <input type="number" id="diastolic" class="form-input" placeholder="Diastolic (bottom)" min="40" max="150" required>
                    </div>
                    <small class="text-gray-500 mt-2 block">Example: 120 / 80</small>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="heartRate">Heart Rate (bpm)</label>
                    <input type="number" id="heartRate" class="form-input" placeholder="e.g., 72" min="40" max="200" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="age">Age (years)</label>
                    <input type="number" id="age" class="form-input" placeholder="e.g., 45" min="1" max="120" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="activity">Activity Level Before Reading</label>
                    <select id="activity" class="form-input" required>
                        <option value="">Select...</option>
                        <option value="resting">Resting (5+ minutes)</option>
                        <option value="light">Light Activity</option>
                        <option value="moderate">Moderate Activity</option>
                        <option value="intense">Intense Activity</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="medications">On Blood Pressure Medication?</label>
                    <select id="medications" class="form-input" required>
                        <option value="">Select...</option>
                        <option value="no">No</option>
                        <option value="yes">Yes</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-diagnose">
                    <i class="fas fa-brain mr-2"></i>
                    Analyze Reading
                </button>
            </form>
            
            <!-- Result Card -->
            <div id="resultCard" class="result-card">
                <div class="chart-container">
                    <canvas id="bpChart"></canvas>
                </div>
                
                <div id="bpCategory" class="bp-category"></div>
                <div id="bpDescription" class="text-gray-300 mb-4 text-center"></div>
                <div id="recommendations" class="mt-4"></div>
            </div>
        </div>
    </div>
    
    <script>
        let bpChart = null;
        
        // Initialize Supabase
        document.addEventListener('DOMContentLoaded', function() {
            window.MedAISupabase.initSupabase();
        });
        
        document.getElementById('bpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Collect form data
            const formData = {
                systolic: parseInt(document.getElementById('systolic').value),
                diastolic: parseInt(document.getElementById('diastolic').value),
                heartRate: parseInt(document.getElementById('heartRate').value),
                age: parseInt(document.getElementById('age').value),
                activity: document.getElementById('activity').value,
                medications: document.getElementById('medications').value
            };
            
            // Show loading state
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Analyzing...';
            btn.disabled = true;
            
            // Simulate AI analysis
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            // Analyze blood pressure
            const analysis = analyzeBP(formData);
            
            // Determine risk level for database
            let riskLevel;
            if (analysis.className === 'cat-crisis') {
                riskLevel = 'critical';
            } else if (analysis.className === 'cat-hypertension2') {
                riskLevel = 'high';
            } else if (analysis.className === 'cat-hypertension1' || analysis.className === 'cat-elevated') {
                riskLevel = 'medium';
            } else {
                riskLevel = 'low';
            }
            
            // Save to Supabase
            const resultData = {
                category: analysis.category,
                description: analysis.description,
                riskLevel: riskLevel
            };
            
            try {
                await window.MedAIDatabase.saveDiagnosisResult('bp', formData, resultData, riskLevel);
                console.log('✅ Blood pressure assessment saved to database');
            } catch (err) {
                console.error('Error saving assessment:', err);
            }
            
            // Display results
            displayResults(formData, analysis);
            
            // Reset button
            btn.innerHTML = '<i class="fas fa-brain mr-2"></i> Analyze Reading';
            btn.disabled = false;
        });
        
        function analyzeBP(data) {
            let category, description, recommendations, className;
            let riskScore = 0;
            const factors = [];
            
            // Determine BP category based on AHA/ACC 2017 guidelines
            const systolic = data.systolic;
            const diastolic = data.diastolic;
            const heartRate = data.heartRate;
            const age = data.age || 40;
            
            // Heart rate analysis
            let hrStatus = 'Normal';
            if (heartRate < 60) { 
                hrStatus = 'Bradycardia'; 
                factors.push('Low heart rate'); 
                riskScore += 1;
            } else if (heartRate > 100) { 
                hrStatus = 'Tachycardia'; 
                factors.push('Elevated heart rate'); 
                riskScore += 2;
            }
            
            // Age factor
            if (age >= 65) { riskScore += 2; factors.push('Age ≥65'); }
            else if (age >= 55) { riskScore += 1; }
            
            // Pulse Pressure Analysis (important cardiovascular indicator)
            const pulsePressure = systolic - diastolic;
            let ppStatus = 'Normal';
            if (pulsePressure > 60) {
                ppStatus = 'Widened';
                factors.push('Wide pulse pressure');
                riskScore += 1;
            } else if (pulsePressure < 30) {
                ppStatus = 'Narrowed';
                factors.push('Narrow pulse pressure');
                riskScore += 1;
            }
            
            // Mean Arterial Pressure calculation
            const map = Math.round(diastolic + (pulsePressure / 3));
            let mapStatus = 'Normal';
            if (map < 70) { mapStatus = 'Low (Hypoperfusion risk)'; riskScore += 2; }
            else if (map > 100) { mapStatus = 'Elevated'; riskScore += 1; }
            
            // Main BP Classification
            if (systolic < 90 || diastolic < 60) {
                category = 'Hypotension';
                className = 'cat-low';
                description = 'Your blood pressure is lower than normal. This may cause dizziness or fainting.';
                recommendations = `
                    <div class="bg-blue-500 bg-opacity-10 border border-blue-500 rounded-lg p-4">
                        <h4 class="font-bold mb-2"><i class="fas fa-info-circle mr-2"></i>Low Blood Pressure Management</h4>
                        <ul class="list-disc list-inside space-y-1">
                            <li>Increase salt intake slightly (if no contraindications)</li>
                            <li>Stay well hydrated (8-10 glasses of water daily)</li>
                            <li>Rise slowly from sitting/lying positions</li>
                            <li>Wear compression stockings if recommended</li>
                            <li>Avoid alcohol and hot environments</li>
                            <li>Consult doctor if symptoms persist</li>
                        </ul>
                    </div>
                `;
            } else if (systolic < 120 && diastolic < 80) {
                category = 'Normal';
                className = 'cat-normal';
                description = 'Your blood pressure is in the normal range. Keep up the healthy lifestyle!';
                recommendations = `
                    <div class="bg-green-500 bg-opacity-10 border border-green-500 rounded-lg p-4">
                        <h4 class="font-bold mb-2"><i class="fas fa-check-circle mr-2"></i>Maintenance Tips</h4>
                        <ul class="list-disc list-inside space-y-1">
                            <li>Continue healthy eating with fruits, vegetables, and whole grains</li>
                            <li>Maintain regular physical activity (150 mins/week)</li>
                            <li>Keep sodium intake below 2,300 mg/day</li>
                            <li>Manage stress with relaxation techniques</li>
                            <li>Annual blood pressure checks recommended</li>
                        </ul>
                    </div>
                `;
            } else if (data.systolic >= 120 && data.systolic < 130 && data.diastolic < 80) {
                category = 'Elevated';
                className = 'cat-elevated';
                description = 'Your blood pressure is elevated. Lifestyle changes can help prevent hypertension.';
                recommendations = `
                    <div class="bg-yellow-500 bg-opacity-10 border border-yellow-500 rounded-lg p-4">
                        <h4 class="font-bold mb-2"><i class="fas fa-exclamation-circle mr-2"></i>Lifestyle Modifications</h4>
                        <ul class="list-disc list-inside space-y-1">
                            <li>Reduce sodium intake to less than 1,500 mg/day</li>
                            <li>Increase physical activity to 30-60 mins most days</li>
                            <li>Maintain healthy weight (BMI 18.5-24.9)</li>
                            <li>Limit alcohol consumption</li>
                            <li>Monitor BP weekly and consult doctor if it increases</li>
                        </ul>
                    </div>
                `;
            } else if ((data.systolic >= 130 && data.systolic < 140) || (data.diastolic >= 80 && data.diastolic < 90)) {
                category = 'Hypertension Stage 1';
                className = 'cat-hypertension1';
                description = 'You have Stage 1 hypertension. Consult your doctor about treatment options.';
                recommendations = `
                    <div class="bg-orange-500 bg-opacity-10 border border-orange-500 rounded-lg p-4">
                        <h4 class="font-bold mb-2"><i class="fas fa-stethoscope mr-2"></i>Medical Attention Needed</h4>
                        <ul class="list-disc list-inside space-y-1">
                            <li>Schedule an appointment with your doctor</li>
                            <li>Discuss medication options and lifestyle changes</li>
                            <li>Monitor BP at home daily</li>
                            <li>Follow DASH diet (Dietary Approaches to Stop Hypertension)</li>
                            <li>Reduce stress and get 7-9 hours of sleep nightly</li>
                        </ul>
                    </div>
                `;
            } else if ((data.systolic >= 140) || (data.diastolic >= 90)) {
                if (data.systolic >= 180 || data.diastolic >= 120) {
                    category = 'Hypertensive Crisis';
                    className = 'cat-crisis';
                    description = 'URGENT: Your blood pressure is dangerously high. Seek immediate medical attention!';
                    recommendations = `
                        <div class="bg-red-500 bg-opacity-20 border-2 border-red-500 rounded-lg p-4">
                            <h4 class="font-bold mb-2 text-red-400"><i class="fas fa-ambulance mr-2"></i>EMERGENCY - ACT NOW</h4>
                            <ul class="list-disc list-inside space-y-1">
                                <li><strong>Call 911 or go to ER immediately</strong></li>
                                <li>Do not drive yourself - call for help</li>
                                <li>Sit down and rest while waiting for help</li>
                                <li>Do NOT take extra BP medication without medical guidance</li>
                                <li>Note any symptoms: chest pain, shortness of breath, vision changes</li>
                            </ul>
                        </div>
                    `;
                } else {
                    category = 'Hypertension Stage 2';
                    className = 'cat-hypertension2';
                    description = 'You have Stage 2 hypertension. Medical treatment is strongly recommended.';
                    recommendations = `
                        <div class="bg-red-500 bg-opacity-10 border border-red-500 rounded-lg p-4">
                            <h4 class="font-bold mb-2"><i class="fas fa-hospital mr-2"></i>Immediate Medical Care Required</h4>
                            <ul class="list-disc list-inside space-y-1">
                                <li>Contact your doctor TODAY</li>
                                <li>Likely need combination of medications</li>
                                <li>Monitor BP twice daily and keep a log</li>
                                <li>Strict sodium restriction (<1,500 mg/day)</li>
                                <li>Immediate lifestyle changes + medication adherence critical</li>
                            </ul>
                        </div>
                    `;
                }
            }
            
            // Adjust for activity level
            if (data.activity !== 'resting') {
                description += ' Note: Reading taken after physical activity may not reflect resting BP. Re-test after 5+ minutes of rest.';
            }
            
            // Note if on medication
            if (data.medications === 'yes' && (systolic >= 130 || diastolic >= 80)) {
                description += ' Since you\'re on medication, consult your doctor about adjusting dosage.';
            }
            
            // Add cardiovascular metrics to recommendations
            const metricsHtml = `
                <div class="bg-gray-800 bg-opacity-50 border border-gray-600 rounded-lg p-4 mt-4">
                    <h4 class="font-bold mb-3"><i class="fas fa-heartbeat mr-2"></i>Cardiovascular Metrics</h4>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <span class="text-gray-400">Pulse Pressure:</span>
                            <span class="text-white ml-2">${pulsePressure} mmHg (${ppStatus})</span>
                        </div>
                        <div>
                            <span class="text-gray-400">Mean Arterial Pressure:</span>
                            <span class="text-white ml-2">${map} mmHg (${mapStatus})</span>
                        </div>
                        <div>
                            <span class="text-gray-400">Heart Rate Status:</span>
                            <span class="text-white ml-2">${hrStatus}</span>
                        </div>
                        <div>
                            <span class="text-gray-400">Risk Factors:</span>
                            <span class="text-white ml-2">${factors.length > 0 ? factors.join(', ') : 'None identified'}</span>
                        </div>
                    </div>
                </div>
            `;
            
            recommendations += metricsHtml;
            
            return { 
                category, 
                className, 
                description, 
                recommendations,
                pulsePressure,
                map,
                hrStatus,
                riskScore,
                factors
            };
        }
        
        function displayResults(data, analysis) {
            const resultCard = document.getElementById('resultCard');
            const bpCategory = document.getElementById('bpCategory');
            const bpDescription = document.getElementById('bpDescription');
            const recommendations = document.getElementById('recommendations');
            
            bpCategory.textContent = analysis.category;
            bpCategory.className = `bp-category ${analysis.className}`;
            bpDescription.textContent = analysis.description;
            recommendations.innerHTML = analysis.recommendations;
            
            // Create chart
            createBPChart(data);
            
            resultCard.classList.add('show');
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function createBPChart(data) {
            const ctx = document.getElementById('bpChart').getContext('2d');
            
            // Destroy existing chart if it exists
            if (bpChart) {
                bpChart.destroy();
            }
            
            bpChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Systolic', 'Diastolic', 'Heart Rate'],
                    datasets: [{
                        label: 'Your Reading',
                        data: [data.systolic, data.diastolic, data.heartRate],
                        backgroundColor: [
                            'rgba(239, 68, 68, 0.6)',
                            'rgba(59, 130, 246, 0.6)',
                            'rgba(16, 185, 129, 0.6)'
                        ],
                        borderColor: [
                            'rgba(239, 68, 68, 1)',
                            'rgba(59, 130, 246, 1)',
                            'rgba(16, 185, 129, 1)'
                        ],
                        borderWidth: 2
                    }, {
                        label: 'Normal Range',
                        data: [120, 80, 72],
                        backgroundColor: 'rgba(156, 163, 175, 0.2)',
                        borderColor: 'rgba(156, 163, 175, 0.5)',
                        borderWidth: 2,
                        borderDash: [5, 5]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#ffffff'
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: '#9ca3af'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            }
                        },
                        x: {
                            ticks: {
                                color: '#9ca3af'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            }
                        }
                    }
                }
            });
        }
    </script>
    
    <!-- Supabase Modules -->
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="database.js"></script>
    
    <!-- Three.js Import Map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    
    <!-- Ballpit Animation -->
    <script type="module" src="ballpit.js"></script>
</body>
</html>
