<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MedAI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-container {
            max-width: 450px;
            width: 100%;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.875rem 1.25rem;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
            color: white;
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .btn-admin {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            padding: 0.875rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-admin:hover {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
        }
        
        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 20px;
            color: #fca5a5;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-12">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-white text-decoration-none">
                        <i class="fas fa-arrow-left me-2"></i>Back to Home
                    </a>
                </div>
                
                <div class="auth-container">
                    <!-- Admin Badge -->
                    <div class="text-center">
                        <div class="admin-badge d-inline-flex">
                            <i class="fas fa-shield-alt"></i>
                            <span>Administrator Access</span>
                        </div>
                    </div>
                    
                    <!-- Logo -->
                    <div class="text-center mb-4">
                        <i class="fas fa-heartbeat" style="font-size: 3rem; color: #ef4444;"></i>
                        <h2 class="text-white mt-3 mb-1">Admin Portal</h2>
                        <p class="text-gray-400">Secure administrative access</p>
                    </div>
                    
                    <!-- Login Form -->
                    <form id="adminLoginForm">
                        <div class="mb-3">
                            <label class="form-label text-gray-300">Admin Email</label>
                            <input type="email" class="form-control" id="adminEmail" placeholder="admin@medai.com" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label text-gray-300">Password</label>
                            <div class="position-relative">
                                <input type="password" class="form-control" id="adminPassword" placeholder="Enter admin password" required>
                                <i class="fas fa-eye position-absolute" id="togglePassword" style="right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: rgba(255,255,255,0.5);"></i>
                            </div>
                        </div>
                        
                        <div class="mb-4 d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label text-gray-400" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-red-400 text-decoration-none">Forgot password?</a>
                        </div>
                        
                        <button type="submit" class="btn btn-admin text-white w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>
                            Admin Login
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="text-gray-400 mb-0">
                            Regular user? 
                            <a href="login.html" class="text-purple-400 text-decoration-none">User Login</a>
                        </p>
                    </div>
                    
                    <!-- Security Notice -->
                    <div class="mt-4 p-3 rounded" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);">
                        <small class="text-gray-400 d-flex align-items-start gap-2">
                            <i class="fas fa-lock mt-1" style="color: #fca5a5;"></i>
                            <span>This area is restricted to authorized administrators only. All login attempts are monitored and logged.</span>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const password = document.getElementById('adminPassword');
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
        
        // Handle admin login
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            
            // Show loading state
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Authenticating...';
            submitBtn.disabled = true;
            
            // Simulate authentication
            setTimeout(() => {
                // Demo credentials
                if (email === 'admin@medai.com' && password === 'admin123') {
                    // Store admin session
                    localStorage.setItem('userRole', 'admin');
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userName', 'Administrator');
                    
                    // Success animation
                    submitBtn.innerHTML = '<i class="fas fa-check me-2"></i>Success!';
                    submitBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                    
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);
                } else {
                    // Error state
                    submitBtn.innerHTML = '<i class="fas fa-times me-2"></i>Invalid credentials';
                    submitBtn.style.background = 'linear-gradient(135deg, #dc2626, #991b1b)';
                    
                    // Show error message
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'alert alert-danger mt-3';
                    errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>Invalid admin credentials. Please try again.';
                    document.querySelector('.auth-container form').appendChild(errorDiv);
                    
                    setTimeout(() => {
                        errorDiv.remove();
                        submitBtn.innerHTML = originalText;
                        submitBtn.style.background = '';
                        submitBtn.disabled = false;
                    }, 3000);
                }
            }, 1500);
        });
        
        // Entrance animation
        gsap.fromTo('.auth-container',
            { opacity: 0, y: 30 },
            { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out', delay: 0.2 }
        );
    </script>
</body>
</html>
