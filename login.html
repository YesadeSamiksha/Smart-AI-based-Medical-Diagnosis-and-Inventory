<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - MedAI</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Ballpit Background -->
    <link rel="stylesheet" href="ballpit.css">
    
    <!-- Three.js Import Map - MUST be in head before any module scripts -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-container {
            max-width: 450px;
            width: 100%;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 10px;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #6366f1;
            color: white;
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }
        
        .tab-button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }
        
        .tab-button.active {
            color: white;
            border-bottom-color: #6366f1;
        }
        
        .social-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <!-- Ballpit Background Canvas -->
    <canvas id="ballpitCanvas"></canvas>
    
    <div class="auth-container" style="position: relative; z-index: 1;">
        <!-- Logo -->
        <div class="text-center mb-4">
            <a href="index.html" class="text-white text-decoration-none">
                <i class="fas fa-heartbeat text-4xl" style="color: #6366f1;"></i>
                <h2 class="mt-2">MedAI</h2>
            </a>
        </div>
        
        <!-- Tabs -->
        <div class="d-flex justify-content-center mb-4">
            <button class="tab-button active" id="loginTab" onclick="showTab('login')">Login</button>
            <button class="tab-button" id="signupTab" onclick="showTab('signup')">Sign Up</button>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" class="auth-form">
            <h3 class="text-white text-center mb-4">Welcome Back</h3>
            
            <div class="mb-3">
                <label class="form-label text-white-50">Email</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label text-white-50">Password</label>
                <input type="password" class="form-control" placeholder="Enter your password" required>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label text-white-50" for="remember">
                        Remember me
                    </label>
                </div>
                <a href="#" class="text-decoration-none" style="color: #6366f1;">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="fas fa-sign-in-alt me-2"></i> Login
            </button>
            
            <div class="text-center my-3">
                <span class="text-white-50">Or continue with</span>
            </div>
            
            <div class="row g-2">
                <div class="col-6">
                    <button type="button" class="social-btn w-100">
                        <i class="fab fa-google"></i> Google
                    </button>
                </div>
                <div class="col-6">
                    <button type="button" class="social-btn w-100">
                        <i class="fab fa-facebook"></i> Facebook
                    </button>
                </div>
            </div>
        </form>
        
        <!-- Signup Form -->
        <form id="signupForm" class="auth-form" style="display: none;">
            <h3 class="text-white text-center mb-4">Create Account</h3>
            
            <div class="mb-3">
                <label class="form-label text-white-50">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your name" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label text-white-50">Email</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label text-white-50">Password</label>
                <input type="password" class="form-control" placeholder="Create a password" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label text-white-50">Confirm Password</label>
                <input type="password" class="form-control" placeholder="Confirm your password" required>
            </div>
            
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label text-white-50" for="terms">
                    I agree to the <a href="#" style="color: #6366f1;">Terms & Conditions</a>
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="fas fa-user-plus me-2"></i> Create Account
            </button>
            
            <div class="text-center my-3">
                <span class="text-white-50">Or sign up with</span>
            </div>
            
            <div class="row g-2">
                <div class="col-6">
                    <button type="button" class="social-btn w-100">
                        <i class="fab fa-google"></i> Google
                    </button>
                </div>
                <div class="col-6">
                    <button type="button" class="social-btn w-100">
                        <i class="fab fa-facebook"></i> Facebook
                    </button>
                </div>
            </div>
        </form>
        
        <!-- Admin Link -->
        <div class="text-center mt-4">
            <p class="text-white-50">
                Administrator? 
                <a href="login-admin.html" class="text-danger text-decoration-none">
                    <i class="fas fa-shield-alt me-1"></i>Admin Portal
                </a>
            </p>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Supabase Modules -->
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    
    <script>
        // Initialize Supabase on page load
        document.addEventListener('DOMContentLoaded', function() {
            window.MedAISupabase.initSupabase();
            
            // Check if already logged in
            checkExistingSession();
        });
        
        async function checkExistingSession() {
            const isAuth = await window.MedAIAuth.checkAuthState();
            if (isAuth) {
                window.location.href = 'dashboard.html';
            }
        }
        
        // Tab Switching
        function showTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            
            if (tab === 'login') {
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
            } else {
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                signupForm.style.display = 'block';
                loginForm.style.display = 'none';
            }
        }
        
        // Check URL hash for signup
        if (window.location.hash === '#signup') {
            showTab('signup');
        }
        
        // Show loading state on button
        function setButtonLoading(btn, loading) {
            if (loading) {
                btn.dataset.originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Please wait...';
                btn.disabled = true;
            } else {
                btn.innerHTML = btn.dataset.originalText;
                btn.disabled = false;
            }
        }
        
        // Show error message
        function showError(message) {
            alert(message);
        }
        
        // Handle Login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = this.querySelector('input[type="email"]').value;
            const password = this.querySelector('input[type="password"]').value;
            const btn = this.querySelector('button[type="submit"]');
            
            setButtonLoading(btn, true);
            
            try {
                const { data, error } = await window.MedAIAuth.signIn(email, password);
                
                if (error) {
                    showError(error.message || 'Login failed. Please check your credentials.');
                    setButtonLoading(btn, false);
                    return;
                }
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } catch (err) {
                showError('An unexpected error occurred. Please try again.');
                setButtonLoading(btn, false);
            }
        });
        
        // Handle Signup
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fullName = this.querySelector('input[type="text"]').value;
            const email = this.querySelector('input[type="email"]').value;
            const password = this.querySelectorAll('input[type="password"]')[0].value;
            const confirmPassword = this.querySelectorAll('input[type="password"]')[1].value;
            const btn = this.querySelector('button[type="submit"]');
            
            if (password !== confirmPassword) {
                showError('Passwords do not match!');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters long.');
                return;
            }
            
            setButtonLoading(btn, true);
            
            try {
                const { data, error } = await window.MedAIAuth.signUp(email, password, fullName);
                
                if (error) {
                    showError(error.message || 'Registration failed. Please try again.');
                    setButtonLoading(btn, false);
                    return;
                }
                
                // Check if email confirmation is required
                if (data.user && !data.session) {
                    alert('Registration successful! Please check your email to confirm your account.');
                    showTab('login');
                    setButtonLoading(btn, false);
                } else {
                    // Auto logged in
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                showError('An unexpected error occurred. Please try again.');
                setButtonLoading(btn, false);
            }
        });
        
        // Handle Google Login
        async function loginWithGoogle() {
            const { data, error } = await window.MedAIAuth.signInWithGoogle();
            if (error) {
                showError(error.message || 'Google login failed.');
            }
        }
        
        // Add click handlers for social buttons
        document.querySelectorAll('.social-btn').forEach(btn => {
            if (btn.innerHTML.includes('Google')) {
                btn.onclick = loginWithGoogle;
            }
        });
    </script>
    
    <!-- Ballpit Animation -->
    <script type="module" src="ballpit.js"></script>
</body>
</html>
