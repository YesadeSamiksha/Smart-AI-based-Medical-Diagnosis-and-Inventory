<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Redirect file:// to localhost:8080 (required for ES modules & CORS) -->
    <script>
        if (window.location.protocol === 'file:') {
            var fileName = window.location.pathname.split('/').pop() || 'index.html';
            window.location.replace('http://localhost:8080/' + fileName);
        }
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="ballpit.css">
    
    <style>
        body { background: #0a0a0f; color: white; min-height: 100vh; }
        
        .orders-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        
        .order-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .order-card:hover {
            border-color: rgba(139, 92, 246, 0.5);
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .order-id {
            font-size: 18px;
            font-weight: 700;
        }
        
        .order-date {
            color: #9ca3af;
            font-size: 14px;
        }
        
        .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-pending {
            background: rgba(234, 179, 8, 0.2);
            color: #fde047;
        }
        
        .status-processing {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        
        .status-completed {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }
        
        .status-delivered {
            background: rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }
        
        .status-cancelled {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }
        
        .order-items {
            margin: 20px 0;
        }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .order-total {
            font-size: 20px;
            font-weight: 700;
            color: #22c55e;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        
        .empty-state i {
            font-size: 80px;
            color: rgba(139, 92, 246, 0.3);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <canvas id="ballpitCanvas"></canvas>
    
    <div class="orders-container">
        <div class="mb-4">
            <a href="dashboard.html" class="text-gray-400 hover:text-white">
                <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
            </a>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-6">
            <div>
                <h1 class="text-4xl font-bold">
                    <i class="fas fa-box mr-3 text-purple-400"></i>My Orders
                </h1>
                <p class="text-gray-400 mt-2">Track and manage your orders</p>
            </div>
            <div class="text-end">
                <div class="text-sm text-gray-400">Welcome,</div>
                <div class="text-lg font-bold" id="userName">User</div>
            </div>
        </div>
        
        <div id="ordersContainer">
            <div class="text-center py-12">
                <i class="fas fa-spinner fa-spin text-4xl text-purple-400 mb-4"></i>
                <p class="text-gray-400">Loading orders...</p>
            </div>
        </div>
    </div>
    
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    
    <script>
        let user = null;
        
        document.addEventListener('DOMContentLoaded', async function() {
            window.MedAISupabase.initSupabase();
            await checkAuth();
            await loadOrders();
        });
        
        async function checkAuth() {
            const isAuth = await window.MedAIAuth.checkAuthState();
            if (!isAuth) {
                window.location.href = 'login.html';
                return;
            }
            
            user = JSON.parse(localStorage.getItem('medai_user') || '{}');
            document.getElementById('userName').textContent = user.name || user.email || 'User';
        }
        
        async function loadOrders() {
            const container = document.getElementById('ordersContainer');
            
            try {
                const supabase = window.MedAISupabase.getSupabase();
                if (!supabase) throw new Error('Supabase not initialized');
                
                // Fetch orders directly from Supabase
                const { data, error} = await supabase
                    .from('orders')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error('Supabase error:', error);
                    throw error;
                }
                
                const orders = data || [];
                console.log('✅ Loaded orders:', orders.length);
                
                // Parse items JSON if needed
                orders.forEach(order => {
                    if (typeof order.items === 'string') {
                        order.items = JSON.parse(order.items);
                    }
                });
                
                if (!orders || orders.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-shopping-bag"></i>
                            <h3 class="text-2xl font-bold mb-3">No Orders Yet</h3>
                            <p class="text-gray-400 mb-6">You haven't placed any orders yet.</p>
                            <a href="shop.html" class="btn btn-primary">
                                <i class="fas fa-shopping-cart mr-2"></i>Start Shopping
                            </a>
                        </div>
                    `;
                    return;
                }
                
                renderOrders(orders);
                
            } catch (error) {
                console.error('❌ Failed to load orders:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle text-red-400"></i>
                        <h3 class="text-2xl font-bold mb-3 text-red-400">Error Loading Orders</h3>
                        <p class="text-gray-400">Please check if you're logged in and try again.</p>
                        <p class="text-sm text-gray-500 mt-2">Error: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        function renderOrders(orders) {
            const container = document.getElementById('ordersContainer');
            
            container.innerHTML = orders.map(order => {
                const orderDate = new Date(order.created_at);
                const items = order.items || [];
                
                return `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <div class="order-id">Order #${order.id.substring(0, 8).toUpperCase()}</div>
                                <div class="order-date">${orderDate.toLocaleDateString('en-IN', {
                                    year: 'numeric',
                                    month: 'long',
                                    day: 'numeric',
                                    hour: '2-digit',
                                    minute: '2-digit'
                                })}</div>
                            </div>
                            <span class="status-badge status-${order.order_status}">
                                ${order.order_status}
                            </span>
                        </div>
                        
                        <div class="order-items">
                            ${items.map(item => `
                                <div class="order-item">
                                    <div>
                                        <div class="font-semibold">${item.name}</div>
                                        <small class="text-gray-400">Quantity: ${item.quantity}</small>
                                    </div>
                                    <div class="text-green-400">₹${(item.price * item.quantity).toFixed(2)}</div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="order-footer">
                            <div>
                                <div class="text-sm text-gray-400">Payment Method</div>
                                <div class="font-semibold">
                                    <i class="fas fa-${order.payment_method === 'COD' ? 'money-bill-wave' : 'credit-card'} mr-2"></i>
                                    ${order.payment_method}
                                </div>
                            </div>
                            <div class="text-end">
                                <div class="text-sm text-gray-400">Total Amount</div>
                                <div class="order-total">₹${parseFloat(order.total).toFixed(2)}</div>
                            </div>
                        </div>
                        
                        ${order.order_status === 'pending' ? `
                            <div class="mt-3">
                                <button class="btn btn-sm btn-outline-danger" onclick="cancelOrder('${order.id}')">
                                    <i class="fas fa-times mr-2"></i>Cancel Order
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }
        
        async function cancelOrder(orderId) {
            if (!confirm('Are you sure you want to cancel this order?')) {
                return;
            }
            
            try {
                const { error } = await window.MedAISupabase.supabase
                    .from('orders')
                    .update({ order_status: 'cancelled' })
                    .eq('id', orderId);
                
                if (error) throw error;
                
                alert('Order cancelled successfully');
                loadOrders();
            } catch (error) {
                console.error('Cancel error:', error);
                alert('Failed to cancel order: ' + error.message);
            }
        }
    </script>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="ballpit.js"></script>
</body>
</html>
